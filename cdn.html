<!DOCTYPE html>
<html lang="vi">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="robots" content="noindex,nofollow" />
    <title>CDN Service - NBBLO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                    radial-gradient(circle at 25% 25%, rgba(255,255,255,0.1) 1px, transparent 1px),
                    radial-gradient(circle at 75% 75%, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: float 6s ease-in-out infinite;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow:
                    0 15px 35px rgba(0, 0, 0, 0.1),
                    0 5px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 90%;
            width: 600px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #667eea;
            animation: pulse 2s ease-in-out infinite;
        }

        h1 {
            color: #2c3e50;
            font-size: 2.2rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        p {
            color: #555;
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .highlight {
            color: #667eea;
            font-weight: 600;
        }

        a {
            display: inline-block;
            color: #fff;
            background: linear-gradient(135deg, #667eea, #764ba2);
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px rgba(102, 126, 234, 0.3);
        }

        a:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(102, 126, 234, 0.4);
        }

        .status-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #27ae60;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 25px;
                margin: 20px;
            }

            h1 { font-size: 1.8rem; }
            p { font-size: 1.1rem; }
            .icon { font-size: 3rem; }
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
            }

            h1 { font-size: 1.5rem; }
            p { font-size: 1rem; }
            a { padding: 10px 25px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="status-badge">✅ Active</div>
    <div class="icon">🚀</div>
    <h1>CDN Service <span class="highlight">NBBLO</span></h1>
    <p>Content Delivery Network (CDN) service is active.<br>
        Optimizing CSS/JS delivery for enhanced performance.</p>
    <a href="https://nbblo.com">← Return to NBBLO</a>
</div>
</body>
</html>
