<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bói Bài Tây</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0c0a;
    --surface: #1a1612;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: #7a6330;
    --cream: #f0e8d8;
    --red: #8b1a1a;
    --red-light: #c42b2b;
    --text: #d4c5a9;
    --text-dim: #7a6e5f;
    --card-w: 72px;
    --card-h: 108px;
    --radius: 8px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    overflow-x: hidden;
  }

  /* Subtle noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; width: 100%; max-width: 760px; }

  /* HEADER */
  .header { text-align: center; margin-bottom: 48px; }
  .header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 400;
    letter-spacing: 0.12em;
    color: var(--gold);
    text-shadow: 0 0 40px rgba(201,168,76,0.3);
  }
  .header p {
    font-size: 16px;
    color: var(--text-dim);
    margin-top: 8px;
    font-style: italic;
    letter-spacing: 0.04em;
  }
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 16px auto; width: 200px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim));
  }
  .divider::after { background: linear-gradient(90deg, var(--gold-dim), transparent); }
  .divider span { color: var(--gold-dim); font-size: 14px; }

  /* STEPS */
  .step { display: none; flex-direction: column; align-items: center; }
  .step.active { display: flex; }

  /* STEP 1 — Stack + Shuffle btn */
  .stack-wrap {
    position: relative;
    width: var(--card-w);
    height: var(--card-h);
    margin: 40px auto 48px;
    cursor: pointer;
  }
  .stack-card {
    position: absolute;
    width: var(--card-w);
    height: var(--card-h);
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--gold-dim);
    transition: transform 0.3s ease;
    backface-visibility: hidden;
  }
  /* stacked shadow layers */
  .stack-card:nth-child(1) { transform: translate(-4px, -4px) rotate(-2deg); }
  .stack-card:nth-child(2) { transform: translate(-2px, -2px) rotate(-1deg); }
  .stack-card:nth-child(3) { transform: translate(0, 0); }

  .card-back-pattern {
    width: 100%; height: 100%;
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    background:
      repeating-linear-gradient(45deg, rgba(201,168,76,0.06) 0, rgba(201,168,76,0.06) 1px, transparent 0, transparent 50%),
      repeating-linear-gradient(-45deg, rgba(201,168,76,0.06) 0, rgba(201,168,76,0.06) 1px, transparent 0, transparent 50%);
    background-size: 10px 10px;
  }
  .card-back-pattern::after {
    content: '✦';
    font-size: 28px;
    color: var(--gold-dim);
  }

  .shuffle-btn {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--gold);
    background: transparent;
    border: 1px solid var(--gold-dim);
    padding: 12px 32px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
  }
  .shuffle-btn:hover {
    background: rgba(201,168,76,0.08);
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(201,168,76,0.15);
  }
  .shuffle-btn:active { transform: scale(0.97); }
  .shuffle-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* SHUFFLE ANIMATION */
  @keyframes shuffleLeft {
    0%   { transform: translate(0,0) rotate(0deg); }
    30%  { transform: translate(-60px, -10px) rotate(-15deg); }
    60%  { transform: translate(-30px, 5px) rotate(-5deg); }
    100% { transform: translate(0,0) rotate(0deg); }
  }
  @keyframes shuffleRight {
    0%   { transform: translate(0,0) rotate(0deg); }
    30%  { transform: translate(60px, -10px) rotate(15deg); }
    60%  { transform: translate(30px, 5px) rotate(5deg); }
    100% { transform: translate(0,0) rotate(0deg); }
  }
  .shuffling .stack-card:nth-child(1) { animation: shuffleLeft 0.4s ease 0s, shuffleRight 0.4s ease 0.4s, shuffleLeft 0.4s ease 0.8s; }
  .shuffling .stack-card:nth-child(2) { animation: shuffleRight 0.4s ease 0.1s, shuffleLeft 0.4s ease 0.5s, shuffleRight 0.4s ease 0.9s; }

  .step1-hint {
    font-size: 14px;
    color: var(--text-dim);
    font-style: italic;
    margin-bottom: 32px;
    text-align: center;
    letter-spacing: 0.03em;
  }

  /* STEP 2 — Fan/spread */
  #step2 { gap: 0; }

  .spread-instruction {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--gold);
    text-align: center;
    margin-bottom: 12px;
  }
  .spread-sub {
    font-size: 14px;
    color: var(--text-dim);
    font-style: italic;
    text-align: center;
    margin-bottom: 40px;
  }

  .fan-wrap {
    position: relative;
    width: 100%;
    height: 220px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    margin-bottom: 32px;
  }

  .fan-card {
    position: absolute;
    width: var(--card-w);
    height: var(--card-h);
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--gold-dim);
    cursor: pointer;
    transform-origin: center bottom;
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    bottom: 0;
    left: 50%;
    margin-left: calc(var(--card-w) / -2);
    /* initial: stacked */
    transform: rotate(0deg) translateY(0px);
  }

  .fan-card .card-back-pattern { border-radius: var(--radius); }

  /* fan spread — set via JS */
  .fan-card.spread {
    /* transform set inline by JS */
  }

  .fan-card:hover:not(.picked) {
    border-color: var(--gold);
    box-shadow: 0 -8px 30px rgba(201,168,76,0.25);
    z-index: 100 !important;
  }

  .fan-card.picked {
    border-color: var(--gold-light);
    box-shadow: 0 0 30px rgba(201,168,76,0.4);
    cursor: default;
  }

  /* selected slots below fan */
  .selected-row {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .slot {
    width: var(--card-w);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .slot-box {
    width: var(--card-w);
    height: var(--card-h);
    border-radius: var(--radius);
    border: 1px dashed var(--gold-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 600px;
  }

  .slot-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--gold-dim);
    text-align: center;
    text-transform: uppercase;
  }

  /* 3D flip card inside slot */
  .card-3d {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card-3d.flipped { transform: rotateY(180deg); }

  .face {
    position: absolute; inset: 0;
    border-radius: var(--radius);
    backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .face-back {
    background: var(--surface);
    border: 1px solid var(--gold-dim);
  }
  .face-front {
    background: #faf6ee;
    border: 1px solid var(--gold);
    transform: rotateY(180deg);
    flex-direction: column;
    padding: 6px;
  }

  .card-rank {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 600;
    line-height: 1;
  }
  .card-suit-big { font-size: 22px; line-height: 1; }
  .card-name-small {
    font-size: 8px;
    letter-spacing: 0.05em;
    text-align: center;
    margin-top: 4px;
    line-height: 1.3;
    font-family: 'Cinzel', serif;
  }

  .hearts, .diamonds { color: var(--red-light); }
  .clubs, .spades { color: #1a1a1a; }

  .counter {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-align: center;
    margin-top: 24px;
  }
  .counter span { color: var(--gold); }

  /* STEP 3 — Result */
  .result-wrap { width: 100%; }
  .result-cards {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 40px;
  }
  .result-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .result-card:hover { transform: translateY(-4px); }

  .result-card-face {
    width: var(--card-w);
    height: var(--card-h);
    border-radius: var(--radius);
    background: #faf6ee;
    border: 1px solid var(--gold);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .result-pos-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--gold-dim);
    text-transform: uppercase;
    text-align: center;
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--gold-dim);
    border-radius: 12px;
    padding: 32px;
    max-width: 400px;
    width: 100%;
    position: relative;
    animation: modalIn 0.3s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: none; border: none;
    color: var(--text-dim); font-size: 20px;
    cursor: pointer; line-height: 1;
  }
  .modal-suit { font-size: 40px; margin-bottom: 8px; }
  .modal-name {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .modal-pos {
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .modal-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    margin-bottom: 16px;
  }
  .modal-meaning {
    font-size: 16px;
    line-height: 1.7;
    color: var(--text);
    font-style: italic;
  }
  .modal-keywords {
    margin-top: 12px;
    font-size: 13px;
    color: var(--gold-dim);
    letter-spacing: 0.05em;
  }

  .reset-btn {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid #2a2520;
    padding: 10px 28px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    display: block;
    margin: 0 auto;
  }
  .reset-btn:hover { color: var(--gold-dim); border-color: var(--gold-dim); }

  /* spread selector */
  .spread-selector {
    display: flex; gap: 10px; margin-bottom: 32px; justify-content: center;
  }
  .spread-opt {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid #2a2520;
    padding: 8px 16px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .spread-opt.active { color: var(--gold); border-color: var(--gold-dim); }
  .spread-opt:hover { color: var(--gold-dim); border-color: #3a3020; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Bói Bài Tây</h1>
    <div class="divider"><span>✦</span></div>
    <p>52 lá · Cartomancy</p>
  </div>

  <!-- STEP 1: Stack + Shuffle -->
  <div class="step active" id="step1">
    <p class="step1-hint">Tập trung vào câu hỏi của bạn, sau đó xáo bài</p>

    <div class="spread-selector">
      <button class="spread-opt active" data-count="3">3 lá</button>
      <button class="spread-opt" data-count="5">5 lá</button>
      <button class="spread-opt" data-count="7">7 lá</button>
      <button class="spread-opt" data-count="7">Câu hỏi</button>
    </div>

    <div class="stack-wrap" id="stackWrap">
      <div class="stack-card"><div class="card-back-pattern"></div></div>
      <div class="stack-card"><div class="card-back-pattern"></div></div>
      <div class="stack-card"><div class="card-back-pattern"></div></div>
    </div>

    <button class="shuffle-btn" id="shuffleBtn">✦ Xáo Bài ✦</button>
  </div>

  <!-- STEP 2: Fan + Pick -->
  <div class="step" id="step2">
    <p class="spread-instruction" id="spreadInstruction">Chọn 3 lá</p>
    <p class="spread-sub">Tập trung vào câu hỏi — lá bạn chọn là lá đó</p>

    <div class="fan-wrap" id="fanWrap"></div>

    <div class="selected-row" id="selectedRow"></div>

    <p class="counter">Đã chọn: <span id="pickedCount">0</span> / <span id="targetCount">3</span></p>
  </div>

  <!-- STEP 3: Result -->
  <div class="step" id="step3">
    <div class="result-wrap">
      <p class="spread-instruction" style="margin-bottom:8px">Bấm vào lá để đọc kết quả</p>
      <p class="spread-sub" style="margin-bottom:32px">Tap a card to reveal its meaning</p>
      <div class="result-cards" id="resultCards"></div>
      <button class="reset-btn" id="resetBtn">↺ Bói lại</button>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-suit" id="mSuit"></div>
    <div class="modal-name" id="mName"></div>
    <div class="modal-pos" id="mPos"></div>
    <div class="modal-divider"></div>
    <div class="modal-meaning" id="mMeaning"></div>
    <div class="modal-keywords" id="mKeywords"></div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const SUITS = {
  hearts:   { sym: '♥', label: 'Hearts',   cls: 'hearts' },
  diamonds: { sym: '♦', label: 'Diamonds', cls: 'diamonds' },
  clubs:    { sym: '♣', label: 'Clubs',    cls: 'clubs' },
  spades:   { sym: '♠', label: 'Spades',   cls: 'spades' },
};

const RANKS = [
  { rank:'A', name:'Ace' }, { rank:'2', name:'Two' }, { rank:'3', name:'Three' },
  { rank:'4', name:'Four' }, { rank:'5', name:'Five' }, { rank:'6', name:'Six' },
  { rank:'7', name:'Seven' }, { rank:'8', name:'Eight' }, { rank:'9', name:'Nine' },
  { rank:'10', name:'Ten' }, { rank:'J', name:'Jack' }, { rank:'Q', name:'Queen' },
  { rank:'K', name:'King' },
];

// Simplified meanings per suit + rank for demo
const MEANINGS = {
  hearts: {
    A:'Tin vui trong tình yêu. Khởi đầu mới, cảm xúc tươi sáng.',
    '2':'Hai tâm hồn hòa hợp. Cam kết và sự gắn bó bền chặt.',
    '3':'Niềm vui sum vầy, nhưng coi chừng người thứ ba.',
    '4':'Bất an cảm xúc. Có sự thay đổi đang đến.',
    '5':'Hờn nhẹ, thất vọng nhỏ — sẽ qua nhanh.',
    '6':'Hoài niệm, nhận được sự quan tâm chân thành.',
    '7':'Lãng mạn, mộng mơ. Tỉnh táo trước lời hứa ngọt ngào.',
    '8':'Rào cản cảm xúc. Cần kiên nhẫn và thời gian.',
    '9':'Điều ước thành hiện thực. Kết quả tốt đẹp sắp đến.',
    '10':'Hạnh phúc trọn vẹn. Gia đình và tình yêu thăng hoa.',
    J:'Người trẻ đáng tin, có thiện ý. Tin tức tình cảm.',
    Q:'Người phụ nữ tốt bụng, yêu thương. Người thân đáng tin.',
    K:'Người đàn ông nhân từ, đáng tin cậy. Hỗ trợ vô điều kiện.',
  },
  diamonds: {
    A:'Tin tức quan trọng. Cơ hội tài chính sắp đến.',
    '2':'Lựa chọn khó khăn về tiền bạc. Cần cân nhắc kỹ.',
    '3':'Tranh chấp nhỏ, hiểu lầm trong giao dịch.',
    '4':'Ổn định tài chính. Tích lũy từng bước vững chắc.',
    '5':'Thay đổi bất ngờ về tài chính hoặc công việc.',
    '6':'Cân bằng thu chi. Ai đó hào phóng với bạn.',
    '7':'Quyết định liên quan tiền bạc cần thận trọng.',
    '8':'Nỗ lực thực tế mang lại kết quả. Công việc tốt.',
    '9':'Kỳ vọng cao — thực tế đôi khi khác mong đợi.',
    '10':'Thành công vật chất rõ ràng. Tài lộc ổn định.',
    J:'Người trẻ thực dụng. Tin tức liên quan tiền bạc.',
    Q:'Người phụ nữ thực tế, khéo léo trong tài chính.',
    K:'Người đàn ông có quyền lực và tài chính mạnh.',
  },
  clubs: {
    A:'Khởi đầu mới trong sự nghiệp. Năng lượng hành động.',
    '2':'Đối tác hợp tác tốt. Cần thống nhất hướng đi.',
    '3':'Mở rộng kết nối, cơ hội từ nhiều hướng.',
    '4':'Nền tảng vững chắc. Thành quả từ nỗ lực lâu dài.',
    '5':'Cạnh tranh, xung đột nhỏ trong công việc.',
    '6':'Tiến triển đều đặn. Được hỗ trợ từ người xung quanh.',
    '7':'Thử thách cần vượt qua bằng ý chí và kiên trì.',
    '8':'Làm việc chăm chỉ, kết quả sẽ đến xứng đáng.',
    '9':'Thành tích được ghi nhận. Uy tín tăng cao.',
    '10':'Thành công lớn trong sự nghiệp. Vị thế vững mạnh.',
    J:'Người trẻ tham vọng. Tin tức tốt về công việc.',
    Q:'Người phụ nữ tự lập, quyết đoán trong sự nghiệp.',
    K:'Người đàn ông có tầm nhìn, lãnh đạo mạnh mẽ.',
  },
  spades: {
    A:'Cảnh báo quan trọng. Sự thật khắc nghiệt cần đối mặt.',
    '2':'Chia rẽ, bất đồng. Cần đối thoại thẳng thắn.',
    '3':'Đau lòng, vỡ mộng trong tình cảm hoặc công việc.',
    '4':'Giai đoạn nghỉ ngơi, cô lập để phục hồi.',
    '5':'Thất bại tạm thời. Học từ sai lầm để tiến lên.',
    '6':'Thoát khỏi khó khăn. Hành trình đến giai đoạn mới.',
    '7':'Cạm bẫy ẩn. Ai đó không trung thực với bạn.',
    '8':'Bị hạn chế bởi hoàn cảnh. Cần kiên nhẫn chờ đợi.',
    '9':'Lo lắng, nỗi sợ cần đối mặt trực tiếp.',
    '10':'Kết thúc chu kỳ khó khăn. Cổng mới sắp mở.',
    J:'Người trẻ gây rắc rối hoặc tin tức xấu sắp đến.',
    Q:'Người phụ nữ phức tạp, có thể gây rắc rối.',
    K:'Người đàn ông quyền lực nhưng lạnh lùng, khắt khe.',
  },
};

const POSITIONS_MAP = {
  3: ['Quá Khứ', 'Hiện Tại', 'Tương Lai'],
  5: ['Hoàn Cảnh', 'Thách Thức', 'Lời Khuyên', 'Ảnh Hưởng Ngoài', 'Kết Quả'],
  7: ['Quá Khứ', 'Hiện Tại', 'Yếu Tố Ẩn', 'Chướng Ngại', 'Môi Trường', 'Lời Khuyên', 'Kết Quả'],
};

// Build 52-card deck
function buildDeck() {
  const deck = [];
  for (const [suitKey, suit] of Object.entries(SUITS)) {
    for (const { rank, name } of RANKS) {
      deck.push({
        id: `${name.toLowerCase()}_of_${suitKey}`,
        name: `${name} of ${suit.label}`,
        rank, suit: suitKey, sym: suit.sym, cls: suit.cls,
        meaning: MEANINGS[suitKey][rank] || '—',
        keywords: rank === 'A' ? ['khởi đầu', 'tiềm năng', 'cơ hội'] :
                  ['J','Q','K'].includes(rank) ? ['con người', 'ảnh hưởng', 'tính cách'] :
                  ['sự kiện', 'năng lượng', 'chuyển biến'],
      });
    }
  }
  return deck;
}

// Fisher-Yates shuffle
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let deck = buildDeck();
let shuffledDeck = [];
let targetCount = 3;
let pickedCards = []; // { card, positionLabel }

// ── DOM ───────────────────────────────────────────────────────────────────────
const step1 = document.getElementById('step1');
const step2 = document.getElementById('step2');
const step3 = document.getElementById('step3');
const shuffleBtn = document.getElementById('shuffleBtn');
const stackWrap = document.getElementById('stackWrap');
const fanWrap = document.getElementById('fanWrap');
const selectedRow = document.getElementById('selectedRow');
const pickedCountEl = document.getElementById('pickedCount');
const targetCountEl = document.getElementById('targetCount');
const resultCards = document.getElementById('resultCards');
const modalOverlay = document.getElementById('modalOverlay');
const modalClose = document.getElementById('modalClose');
const resetBtn = document.getElementById('resetBtn');

// Spread selector
document.querySelectorAll('.spread-opt').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.spread-opt').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    targetCount = parseInt(btn.dataset.count);
  });
});

// ── STEP 1: SHUFFLE ───────────────────────────────────────────────────────────
shuffleBtn.addEventListener('click', () => {
  shuffleBtn.disabled = true;
  stackWrap.classList.add('shuffling');

  setTimeout(() => {
    stackWrap.classList.remove('shuffling');
    shuffledDeck = shuffle(deck);
    goToStep2();
  }, 1300);
});

// ── STEP 2: FAN ───────────────────────────────────────────────────────────────
function goToStep2() {
  step1.classList.remove('active');
  step2.classList.add('active');

  document.getElementById('spreadInstruction').textContent = `Chọn ${targetCount} lá`;
  targetCountEl.textContent = targetCount;
  pickedCountEl.textContent = 0;
  pickedCards = [];

  buildSlots();
  buildFan();
}

function buildSlots() {
  const positions = POSITIONS_MAP[targetCount];
  selectedRow.innerHTML = '';
  positions.forEach((label, i) => {
    selectedRow.innerHTML += `
      <div class="slot" id="slot${i}">
        <div class="slot-box">
          <div class="card-3d" id="card3d${i}">
            <div class="face face-back"><div class="card-back-pattern"></div></div>
            <div class="face face-front" id="face${i}"></div>
          </div>
        </div>
        <div class="slot-label">${label}</div>
      </div>`;
  });
}

function buildFan() {
  fanWrap.innerHTML = '';
  const total = shuffledDeck.length; // 52
  const wrapW = fanWrap.offsetWidth || 600;
  const maxAngle = Math.min(80, total * 1.6); // total spread angle

  shuffledDeck.forEach((card, i) => {
    const angle = -maxAngle / 2 + (maxAngle / (total - 1)) * i;
    const el = document.createElement('div');
    el.className = 'fan-card';
    el.dataset.index = i;
    el.innerHTML = `<div class="card-back-pattern"></div>`;

    // spread with stagger animation
    setTimeout(() => {
      el.style.transform = `rotate(${angle}deg) translateY(-10px)`;
      el.style.zIndex = i;
      el.classList.add('spread');
    }, i * 8);

    el.addEventListener('mouseenter', () => {
      if (!el.classList.contains('picked')) {
        el.style.transform = `rotate(${angle}deg) translateY(-30px)`;
        el.style.zIndex = 200;
      }
    });
    el.addEventListener('mouseleave', () => {
      if (!el.classList.contains('picked')) {
        el.style.transform = `rotate(${angle}deg) translateY(-10px)`;
        el.style.zIndex = i;
      }
    });

    el.addEventListener('click', () => pickCard(el, i, angle));
    fanWrap.appendChild(el);
  });
}

function pickCard(el, index, angle) {
  if (el.classList.contains('picked')) return;
  if (pickedCards.length >= targetCount) return;

  const card = shuffledDeck[index]; // LÁ USER CHỌN THẬT SỰ
  const slotIndex = pickedCards.length;
  const positions = POSITIONS_MAP[targetCount];

  pickedCards.push({ card, position: positions[slotIndex] });

  // Mark as picked in fan
  el.classList.add('picked');
  el.style.transform = `rotate(${angle}deg) translateY(-50px)`;
  el.style.borderColor = 'var(--gold-light)';
  el.style.zIndex = 300;

  // Fill slot
  const face = document.getElementById(`face${slotIndex}`);
  face.innerHTML = `
    <span class="card-rank ${card.cls}">${card.rank}</span>
    <span class="card-suit-big ${card.cls}">${card.sym}</span>
    <span class="card-name-small ${card.cls}">${card.name}</span>`;

  setTimeout(() => {
    document.getElementById(`card3d${slotIndex}`).classList.add('flipped');
  }, 200);

  pickedCountEl.textContent = pickedCards.length;

  if (pickedCards.length === targetCount) {
    setTimeout(goToStep3, 1200);
  }
}

// ── STEP 3: RESULT ────────────────────────────────────────────────────────────
function goToStep3() {
  step2.classList.remove('active');
  step3.classList.add('active');

  resultCards.innerHTML = '';
  pickedCards.forEach(({ card, position }, i) => {
    const div = document.createElement('div');
    div.className = 'result-card';
    div.innerHTML = `
      <div class="result-card-face">
        <span class="card-rank ${card.cls}" style="font-size:20px">${card.rank}</span>
        <span class="card-suit-big ${card.cls}" style="font-size:28px">${card.sym}</span>
        <span class="card-name-small ${card.cls}">${card.name}</span>
      </div>
      <div class="result-pos-label">${position}</div>`;
    div.addEventListener('click', () => openModal(card, position));
    resultCards.appendChild(div);

    // stagger appear
    div.style.opacity = '0';
    div.style.transform = 'translateY(16px)';
    setTimeout(() => {
      div.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
      div.style.opacity = '1';
      div.style.transform = 'translateY(0)';
    }, i * 150 + 100);
  });
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(card, position) {
  document.getElementById('mSuit').innerHTML =
    `<span class="${card.cls}">${card.sym}</span>`;
  document.getElementById('mName').textContent = card.name;
  document.getElementById('mPos').textContent = position;
  document.getElementById('mMeaning').textContent = card.meaning;
  document.getElementById('mKeywords').textContent =
    '✦ ' + card.keywords.join(' · ');
  modalOverlay.classList.add('open');
}

modalClose.addEventListener('click', () => modalOverlay.classList.remove('open'));
modalOverlay.addEventListener('click', e => {
  if (e.target === modalOverlay) modalOverlay.classList.remove('open');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') modalOverlay.classList.remove('open');
});

// ── RESET ─────────────────────────────────────────────────────────────────────
resetBtn.addEventListener('click', () => {
  step3.classList.remove('active');
  deck = buildDeck();
  shuffledDeck = [];
  pickedCards = [];
  shuffleBtn.disabled = false;
  fanWrap.innerHTML = '';
  selectedRow.innerHTML = '';
  step1.classList.add('active');
});
</script>
</body>
</html>
